controller:
  admin:
    existingSecret: jenkins-admin
    userKey: jenkins-admin-user
    passwordKey: jenkins-admin-password

  containerEnv:
    - name: AWS_ACCESS_KEY_ID
      valueFrom:
        secretKeyRef:
          name: jenkins-secrets
          key: aws-access-key-id
    - name: AWS_SECRET_ACCESS_KEY
      valueFrom:
        secretKeyRef:
          name: jenkins-secrets
          key: aws-secret-access-key
    - name: GITHUB_TOKEN
      valueFrom:
        secretKeyRef:
          name: jenkins-secrets
          key: github-token
    - name: TF_STATE_BUCKET
      valueFrom:
        secretKeyRef:
          name: jenkins-secrets
          key: tf-state-bucket
    - name: MAIL_SMTP_HOST
      valueFrom:
        secretKeyRef:
          name: jenkins-secrets
          key: mail-smtp-host
    - name: MAIL_SMTP_PORT
      valueFrom:
        secretKeyRef:
          name: jenkins-secrets
          key: mail-smtp-port
    - name: MAIL_SMTP_USER
      valueFrom:
        secretKeyRef:
          name: jenkins-secrets
          key: mail-smtp-user
    - name: MAIL_SMTP_PASSWORD
      valueFrom:
        secretKeyRef:
          name: jenkins-secrets
          key: mail-smtp-password

  serviceType: ClusterIP

  numExecutors: 0
  initializeOnce: true

  installPlugins:
    - kubernetes
    - workflow-aggregator
    - git
    - configuration-as-code
    - pipeline-stage-view
    - job-dsl
    - aws-credentials
    - credentials
    - plain-credentials
    - ssh-credentials
    - junit
    - timestamper
    - email-ext
    
  JCasC:
    defaultConfig: true
    configScripts:
      welcome-message: |
        jenkins:
          systemMessage: "Jenkins configured via Helm and JCasC for Terraform CI/CD"
      
      tools: |
        tool:
          git:
            installations:
            - home: "git"
              name: "Default"
          mavenGlobalConfig:
            globalSettingsProvider: "standard"
            settingsProvider: "standard"
      
      credentials: |
        credentials:
          system:
            domainCredentials:
              - credentials:
                  - aws:
                      id: "aws-creds"
                      accessKey: "${AWS_ACCESS_KEY_ID}"
                      secretKey: "${AWS_SECRET_ACCESS_KEY}"
                      scope: GLOBAL
                      description: "AWS credentials for Terraform pipeline"

                  - string:
                      id: "github-token"
                      secret: "${GITHUB_TOKEN}"
                      scope: GLOBAL
                      description: "GitHub token for Jenkins pipeline access"

                  - string:
                      id: "tf-state-bucket"
                      secret: "${TF_STATE_BUCKET}"
                      scope: GLOBAL
                      description: "Terraform remote state bucket"

                  - usernamePassword:
                      id: "gmail_cred"
                      username: "${MAIL_SMTP_USER}"
                      password: "${MAIL_SMTP_PASSWORD}"
                      usernameSecret: true
                      scope: GLOBAL

      email: |
        unclassified:
          location:
            adminAddress: "${MAIL_SMTP_USER}"
          buildDiscarders:
            configuredBuildDiscarders:
            - "jobBuildDiscarder"
          email-ext:
            mailAccount:
              credentialsId: "gmail_cred"
              smtpHost: "smtp.gmail.com"
              smtpPort: "465"
              useSsl: true
          mailer:
            authentication:
              username: "${MAIL_SMTP_USER}"
              password: "${MAIL_SMTP_PASSWORD}"
            charset: "UTF-8"
            smtpHost: "smtp.gmail.com"
            smtpPort: "465"
            useSsl: true
            useTls: false

      jobs: |
        jobs:
          - script: |
              pipelineJob('feature-vpc-pr') {
                description('Terraform validation and plan for feature/* branches')

                definition {
                  cpsScm {
                    scm {
                      git {
                        remote {
                          url('https://github.com/simonangel-fong/Jenkins_Demo_Terraform_Multi_Env.git')
                          credentials('github-token')
                        }
                        branches('*/feature/*')
                      }
                    }
                    scriptPath('cicd/jenkins/Jenkinsfile')
                  }
                }
              }

          - script: |
              pipelineJob('master-pipeline') {
                description('Terraform pipeline for master branch')

                definition {
                  cpsScm {
                    scm {
                      git {
                        remote {
                          url('https://github.com/simonangel-fong/Jenkins_Demo_Terraform_Multi_Env.git')
                          credentials('github-token')
                        }
                        branches('*/master')
                      }
                    }
                    scriptPath('Jenkinsfile')
                  }
                }
              }

persistence:
  enabled: true
  size: 8Gi

agent:
  enabled: true

  maxRequestsPerHostStr: "32"
  retentionTimeout: "5"
  waitForPodSec: "120"

  podTemplates:
    terraform: |
      - name: terraform
        label: agent-terraform
        serviceAccount: jenkins
        containers:
          - name: terraform
            image: hashicorp/terraform:1.14
            command: "/bin/sh -c"
            args: "cat"
            ttyEnabled: true
            resourceRequestCpu: "250m"
            resourceRequestMemory: "256Mi"
            resourceLimitCpu: "1"
            resourceLimitMemory: "1Gi"

          - name: git
            image: alpine/git:2.45.2
            command: "/bin/sh -c"
            args: "cat"
            ttyEnabled: true
            resourceRequestCpu: "100m"
            resourceRequestMemory: "128Mi"
            resourceLimitCpu: "500m"
            resourceLimitMemory: "512Mi"

          - name: aws
            image: amazon/aws-cli:2.34.34
            command: "/bin/sh -c"
            args: "cat"
            ttyEnabled: true
            resourceRequestCpu: "100m"
            resourceRequestMemory: "128Mi"
            resourceLimitCpu: "500m"
            resourceLimitMemory: "512Mi"

          - name: trivy
            image: aquasec/trivy:latest
            command: "/bin/sh -c"
            args: "cat"
            ttyEnabled: true
            resourceRequestCpu: "100m"
            resourceRequestMemory: "128Mi"
            resourceLimitCpu: "500m"
            resourceLimitMemory: "512Mi"